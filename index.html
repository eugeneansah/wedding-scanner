<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wedding Check-In</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body style="text-align:center;font-family:sans-serif;">

<h2>Wedding Check-In</h2>

  <input type="password" id="pin" placeholder="Enter Staff PIN"/>
<button id="startScanBtn">Start Scan</button>
<br><br>

<div id="reader" style="width:300px;margin:auto;"></div>

<h3 id="result"></h3>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwvTX_qnDQuHJmixvag0SggUv0QuBrTkJukLXxgluy5XdGcrYSDIxXqhNJq35ncDj8/exec";
{ fps: 10, qrbox: 300, aspectRatio: 1.0 }
function onScanSuccess(decodedText) {
   console.log("QR Detected:", decodedText);
  const pin = document.getElementById("pin").value;
  if (!pin) {
    alert("Enter PIN first");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      code: decodedText,
      pin: pin
    })
  })
  .then(res => res.json())
  .then(data => {
    const resultDiv = document.getElementById("result");

    if (data.status === "success") {
      resultDiv.innerHTML = "✅ Welcome " + data.name;
    } else if (data.status === "duplicate") {
      resultDiv.innerHTML = "⚠ Already Checked-In";
    } else if (data.status === "unauthorized") {
      resultDiv.innerHTML = "❌ Wrong PIN";
    } else {
      resultDiv.innerHTML = "❌ Invite Not Found";
    }
  });
}

// Initialize scanner
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    // Try to select back camera first
    let backCam = devices.find(cam => cam.label.toLowerCase().includes("back"));
    if (!backCam) backCam = devices[0]; // fallback to first camera

    html5QrCode.start(
      { deviceId: { exact: backCam.id } },
      { fps: 10, qrbox: 250 },
      decodedText => onScanSuccess(decodedText),
      errorMessage => { /* console.log(errorMessage); optional */ }
    );
  } else {
    alert("No camera found");
  }
}).catch(err => {
  console.error(err);
  alert("Camera initialization failed: " + err);
});

  document.getElementById("startScanBtn").addEventListener("click", function() {
  const pin = document.getElementById("pin").value;

  if (!pin) {
    alert("Enter PIN first");
    return;
  }
document.getElementById("startScanBtn").addEventListener("click", function() {
  // Hide PIN & button
  document.getElementById("pin").style.display = "none";
  document.getElementById("startScanBtn").style.display = "none";

  // Start scanning
  startScanner();
});
  // Hide the PIN input and button after starting
  document.getElementById("pin").style.display = "none";
  document.getElementById("startScanBtn").style.display = "none";

  // Start camera scanner
  Html5Qrcode.getCameras().then(devices => {
    if (devices.length) {
      html5QrCode.start(
        devices[0].id,
        { fps: 10, qrbox: 250 },
        decodedText => {

          fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
              code: decodedText,
              pin: pin
            })
          })
          .then(res => res.json())
          .then(data => {
            const resultDiv = document.getElementById("result");

            if (data.status === "success") {
              resultDiv.innerHTML = "✅ Welcome " + data.name;
            } else if (data.status === "duplicate") {
              resultDiv.innerHTML = "⚠ Already Checked-In";
            } else if (data.status === "unauthorized") {
              resultDiv.innerHTML = "❌ Wrong PIN";
            } else {
              resultDiv.innerHTML = "❌ Invite Not Found";
            }

          });

        }
      );
    }
  });
});

</script>

</body>
</html>
